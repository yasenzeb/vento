<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vento - السلة</title>
<link rel="icon" href="logo.jpeg" type="image/jpeg">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: { cairo: ['Cairo', 'sans-serif'] },
      }
    }
  }
</script>
<script>
  // Restore theme immediately before render
  if (localStorage.getItem('vento_theme') === 'dark') {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
* { font-family:'Cairo',sans-serif; }
::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-thumb{background:#22d3ee;border-radius:3px}
</style>
</head>
<body class="bg-gray-50 text-black dark:bg-gray-950 dark:text-gray-100 min-h-screen flex flex-col" x-data="cartPage()" x-init="init()">

<!-- NAVBAR -->
<nav class="bg-white dark:bg-gray-950 border-b border-gray-100 dark:border-gray-800 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14 md:h-16">
    <a href="index.html" class="flex items-center">
      <div class="bg-black dark:bg-white rounded-lg px-2 py-1 md:px-3 flex items-center gap-2">
        <img src="logo.jpeg" alt="Vento" class="w-6 h-6 md:w-8 md:h-8 rounded-full">
        <span class="text-white dark:text-black font-black text-base md:text-lg tracking-widest">VENTO</span>
      </div>
    </a>
    <a href="index.html" class="text-sm font-bold text-gray-600 dark:text-gray-300 hover:text-gray-800 dark:hover:text-white"><i class="fas fa-home ml-1"></i>العودة للمتجر</a>
  </div>
</nav>

<div class="max-w-3xl mx-auto px-4 py-8 flex-1 w-full">
  <h1 class="text-2xl md:text-3xl font-black mb-6 flex items-center gap-2">
    <i class="fas fa-shopping-cart text-gray-850 dark:text-gray-250"></i> سلة المشتريات
  </h1>

  <template x-if="cart.length > 0">
    <div>
      <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 overflow-hidden mb-6">
        <template x-for="(item, idx) in cart" :key="item._key">
          <div class="p-4 flex gap-4 border-b border-gray-50 dark:border-gray-800 last:border-0 relative group">
            <button @click="removeItem(idx)" class="absolute top-4 left-4 text-gray-300 hover:text-red-500 transition">
              <i class="fas fa-trash-alt"></i>
            </button>
            <div class="w-20 h-20 md:w-24 md:h-24 bg-gray-100 dark:bg-gray-850 rounded-xl overflow-hidden flex-shrink-0">
              <img :src="item.image_url || 'logo.jpeg'" alt="" class="w-full h-full object-cover">
            </div>
            <div class="flex-1 text-right">
              <h3 class="font-bold text-sm md:text-base leading-tight mb-1 pr-6" x-text="item.name"></h3>
              <div class="text-xs text-gray-500 dark:text-gray-400 mb-2 flex gap-3">
                <span x-show="item.size" x-text="'المقاس: '+item.size"></span>
                <span x-show="item.color" x-text="'اللون: '+item.color"></span>
              </div>
              <div class="flex items-center justify-between">
                <div class="text-black dark:text-white font-black text-sm md:text-base" x-text="(item.finalPrice*item.qty) + ' EGP'"></div>
                <div class="flex items-center gap-2 bg-gray-50 dark:bg-gray-800 rounded-lg border border-gray-100 dark:border-gray-700">
                  <button @click="updateQty(idx, -1)" class="w-8 h-8 flex items-center justify-center font-bold text-gray-500 hover:text-black hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg transition">−</button>
                  <span class="w-4 text-center text-sm font-bold" x-text="item.qty"></span>
                  <button @click="updateQty(idx, 1)" class="w-8 h-8 flex items-center justify-center font-bold text-gray-500 hover:text-black hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg transition">+</button>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>

      <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 p-5 mb-6">
        <div class="flex justify-between items-center mb-3 text-gray-600 dark:text-gray-300">
          <span>المجموع الفرعي:</span>
          <span class="font-bold text-gray-900 dark:text-white" x-text="subtotal + ' EGP'"></span>
        </div>
        <div class="flex justify-between items-center mb-4 text-gray-600 dark:text-gray-300">
          <span>الشحن:</span>
          <span class="text-green-600 dark:text-green-400 font-bold">مجاني بالكامل</span>
        </div>
        <hr class="border-gray-100 dark:border-gray-800 mb-4">
        <div class="flex justify-between items-center mb-6">
          <span class="font-black text-lg">الإجمالي:</span>
          <span class="font-black text-2xl text-black dark:text-white" x-text="subtotal + ' EGP'"></span>
        </div>
        <a href="checkout.html" class="block w-full bg-black dark:bg-white text-white dark:text-black text-center font-black py-4 rounded-xl hover:opacity-90 transition shadow-lg text-lg">
          متابعة للدفع <i class="fas fa-arrow-left mr-2"></i>
        </a>
      </div>
    </div>
  </template>

  <template x-if="cart.length === 0">
    <div class="text-center py-20">
      <i class="fas fa-shopping-basket text-6xl text-gray-200 dark:text-gray-800 mb-4"></i>
      <p class="text-gray-500 dark:text-gray-400 font-bold text-lg mb-6">سلتك فارغة تماماً</p>
      <a href="index.html" class="bg-black dark:bg-white text-white dark:text-black px-8 py-3 rounded-full font-bold hover:opacity-90 transition inline-block">
        تصفح المنتجات
      </a>
    </div>
  </template>
</div>

<script>
function cartPage() {
  return {
    cart: [],
    subtotal: 0,
    init() {
      this.loadCart();
    },
    loadCart() {
      try { this.cart = JSON.parse(localStorage.getItem('vento_cart')||'[]'); } catch { this.cart=[]; }
      this.calc();
    },
    calc() {
      this.subtotal = this.cart.reduce((acc, item) => acc + (item.finalPrice * item.qty), 0);
    },
    updateQty(idx, val) {
      this.cart[idx].qty += val;
      if(this.cart[idx].qty < 1) this.cart[idx].qty = 1;
      this.saveCart();
    },
    removeItem(idx) {
      this.cart.splice(idx, 1);
      this.saveCart();
    },
    saveCart() {
      localStorage.setItem('vento_cart', JSON.stringify(this.cart));
      this.calc();
    }
  }
}
</script>
</body>
</html>
